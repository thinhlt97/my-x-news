name: Lấy tin X hàng ngày

# Chạy 7h sáng giờ VN mỗi ngày (00:00 UTC). Cron của GitHub miễn phí.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:        # cho phép bấm chạy tay trên tab Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # để commit digest.json trở lại repo
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v5

      - name: Cài Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cài thư viện
        run: pip install requests

      - name: Chạy script lấy tin
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
        run: python fetch_digest.py

      - name: Commit digest.json
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add digest.json digest.txt
          git diff --cached --quiet || git commit -m "Cập nhật tin $(date -u +%Y-%m-%d)"
          git push
